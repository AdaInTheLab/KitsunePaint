name: Deploy KitsunePaint to kitsuneden VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps for build pipeline
        run: pip install UnityPy Pillow

      - name: Install npm deps
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Debug — verify key fingerprint
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/test_key
          chmod 600 ~/.ssh/test_key
          echo "=== Key file first/last lines ==="
          head -1 ~/.ssh/test_key
          tail -1 ~/.ssh/test_key
          echo "=== Line count ==="
          wc -l ~/.ssh/test_key
          echo "=== Fingerprint ==="
          ssh-keygen -lf ~/.ssh/test_key || echo "Key parsing failed"
          
      - name: Deploy via rsync over SSH
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          ARGS: "-rlgoDzvc -i --delete"
          SOURCE: "dist/"
          REMOTE_HOST: ${{ secrets.VPS_HOST }}
          REMOTE_USER: ${{ secrets.VPS_USER }}
          TARGET: ${{ secrets.VPS_PATH }}
