name: Deploy KitsunePaint to kitsuneden VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps for build pipeline
        run: pip install UnityPy Pillow

      - name: Install npm deps
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Debug — verify key fingerprint
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/test_key
          chmod 600 ~/.ssh/test_key
          echo "=== Key file first/last lines ==="
          head -1 ~/.ssh/test_key
          tail -1 ~/.ssh/test_key
          echo "=== Line count ==="
          wc -l ~/.ssh/test_key
          echo "=== Fingerprint ==="
          ssh-keygen -lf ~/.ssh/test_key || echo "Key parsing failed"
          
      - name: Test SSH directly
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 -v ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "whoami && hostname"
