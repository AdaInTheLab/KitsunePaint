name: Deploy to DreamHost VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Load nvm for non-interactive SSH
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            BUILD_DIR=/home/dh_hmzudk/kitsunepaint-build

            # Clone or pull
            if [ -d "$BUILD_DIR/.git" ]; then
              cd "$BUILD_DIR"
              git checkout -- .
              git pull origin main
            else
              rm -rf "$BUILD_DIR"
              git clone https://github.com/AdaInTheLab/KitsunePaint.git "$BUILD_DIR"
              cd "$BUILD_DIR"
            fi

            # Install Python deps
            python3 -m pip install --user UnityPy Pillow -q

            # Install all deps + build frontend
            npm install
            npx vite build

            # Kill any rogue node processes not managed by systemd
            pkill -f "node.*server.cjs" 2>/dev/null || true
            sleep 1

            # Restart via systemd (auto-restarts on crash, survives SSH disconnect)
            systemctl --user restart kitsunepaint
            sleep 2
            systemctl --user is-active kitsunepaint

            # Health check
            curl -sf http://localhost:3002 > /dev/null || { echo "❌ Health check failed"; exit 1; }

            echo "✅ Deployed and server restarted"
