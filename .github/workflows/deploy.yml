name: Deploy to DreamHost VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Load nvm for non-interactive SSH
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            BUILD_DIR=/home/dh_hmzudk/kitsunepaint-build

            # Clone or pull
            if [ -d "$BUILD_DIR/.git" ]; then
              cd "$BUILD_DIR"
              git checkout -- .
              git pull origin main
            else
              rm -rf "$BUILD_DIR"
              git clone https://github.com/AdaInTheLab/KitsunePaint.git "$BUILD_DIR"
              cd "$BUILD_DIR"
            fi

            # Install Python deps
            python3 -m pip install --user UnityPy Pillow -q

            # Install all deps + build frontend
            npm install
            npx vite build

            # Restart via systemd (auto-restarts on crash, survives SSH disconnect)
            systemctl --user restart kitsunepaint
            sleep 2
            systemctl --user is-active kitsunepaint

            echo "✅ Deployed and server restarted"
