name: Deploy to DreamHost VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Load nvm for non-interactive SSH
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            WEB_ROOT=/home/dh_hmzudk/paint.kitsuneden.net
            BUILD_DIR=/home/dh_hmzudk/kitsunepaint-build

            # Clone or pull into a separate build directory
            if [ -d "$BUILD_DIR/.git" ]; then
              cd "$BUILD_DIR"
              git pull origin main
            else
              rm -rf "$BUILD_DIR"
              git clone https://github.com/AdaInTheLab/KitsunePaint.git "$BUILD_DIR"
              cd "$BUILD_DIR"
            fi

            # Install Python deps
            python3 -m pip install --user UnityPy Pillow -q

            # Install all deps (including vite for build), then build
            npm install
            npx vite build

            # Deploy to Apache web root
            cp -rf dist/* "$WEB_ROOT/"
            cp -f app.js server.cjs "$WEB_ROOT/"
            cp -rf scripts "$WEB_ROOT/"
            cp -f package.json package-lock.json "$WEB_ROOT/"

            # Install production deps in web root (Express, multer)
            cd "$WEB_ROOT"
            npm install --production

            # Restart Passenger (touch restart.txt signals Apache to reload the app)
            mkdir -p tmp
            touch tmp/restart.txt

            echo "Deployed successfully"
