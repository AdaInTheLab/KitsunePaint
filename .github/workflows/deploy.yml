name: Deploy to DreamHost VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Load nvm for non-interactive SSH
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            WEB_ROOT=/home/dh_hmzudk/paint.kitsuneden.net
            BUILD_DIR=/home/dh_hmzudk/kitsunepaint-build

            # Clone or pull into a separate build directory
            if [ -d "$BUILD_DIR/.git" ]; then
              cd "$BUILD_DIR"
              git pull origin main
            else
              rm -rf "$BUILD_DIR"
              git clone https://github.com/AdaInTheLab/KitsunePaint.git "$BUILD_DIR"
              cd "$BUILD_DIR"
            fi

            # Install Python deps
            python3 -m pip install --user UnityPy Pillow -q

            # Install Node deps + build frontend
            npm install --production
            npx vite build

            # Deploy built files to Apache web root
            cp -rf dist/* "$WEB_ROOT/"
            # Also copy server + scripts for the bundle API
            cp -f server.cjs "$WEB_ROOT/"
            cp -rf scripts "$WEB_ROOT/"
            cp -f package.json "$WEB_ROOT/"
            cp -f package-lock.json "$WEB_ROOT/"
            # Ensure node_modules exist in web root for Express
            cd "$WEB_ROOT"
            npm install --production 2>/dev/null

            # Restart Express with PM2
            if command -v pm2 &> /dev/null; then
              pm2 restart kitsunepaint 2>/dev/null || pm2 start server.cjs --name kitsunepaint
              pm2 save
            else
              npm install -g pm2
              pm2 start server.cjs --name kitsunepaint
              pm2 save
              pm2 startup | tail -1 | bash
            fi

            echo "Deployed successfully"
