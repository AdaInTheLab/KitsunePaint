name: Deploy to DreamHost VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Load nvm for non-interactive SSH
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            BUILD_DIR=/home/dh_hmzudk/kitsunepaint-build

            # Clone or pull
            if [ -d "$BUILD_DIR/.git" ]; then
              cd "$BUILD_DIR"
              git pull origin main
            else
              rm -rf "$BUILD_DIR"
              git clone https://github.com/AdaInTheLab/KitsunePaint.git "$BUILD_DIR"
              cd "$BUILD_DIR"
            fi

            # Install Python deps
            python3 -m pip install --user UnityPy Pillow -q

            # Install all deps + build frontend
            npm install
            npx vite build

            # Write a restart script and run it via `at` so it survives SSH disconnect
            cat > /home/dh_hmzudk/restart-kitsunepaint.sh << 'RESTART'
            #!/bin/bash
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            pkill -f "node /home/dh_hmzudk/kitsunepaint-build/server.cjs" 2>/dev/null || true
            sleep 1
            cd /home/dh_hmzudk/kitsunepaint-build
            nohup node server.cjs > /home/dh_hmzudk/kitsunepaint.log 2>&1 &
            RESTART
            chmod +x /home/dh_hmzudk/restart-kitsunepaint.sh
            echo "bash /home/dh_hmzudk/restart-kitsunepaint.sh" | at now 2>/dev/null || bash /home/dh_hmzudk/restart-kitsunepaint.sh &

            echo "✅ Deployed — server restart scheduled"
