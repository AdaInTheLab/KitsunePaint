name: Deploy to DreamHost VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Load nvm for non-interactive SSH
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            WEB_ROOT=/home/dh_hmzudk/paint.kitsuneden.net
            BUILD_DIR=/home/dh_hmzudk/kitsunepaint-build

            # Clone or pull into a separate build directory
            if [ -d "$BUILD_DIR/.git" ]; then
              cd "$BUILD_DIR"
              git pull origin main
            else
              rm -rf "$BUILD_DIR"
              git clone https://github.com/AdaInTheLab/KitsunePaint.git "$BUILD_DIR"
              cd "$BUILD_DIR"
            fi

            # Install Python deps
            python3 -m pip install --user UnityPy Pillow -q

            # Install all deps (including vite for build), then build
            npm install
            npx vite build

            # Deploy built frontend to Apache web root
            cp -rf dist/* "$WEB_ROOT/"

            # Copy server files to build dir (Express runs from here)
            cd "$BUILD_DIR"
            npm install --production

            # Restart Express via PM2
            pm2 restart kitsunepaint 2>/dev/null || pm2 start server.cjs --name kitsunepaint --cwd "$BUILD_DIR"
            pm2 save

            echo "Deployed successfully"
