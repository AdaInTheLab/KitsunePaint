name: Deploy to DreamHost VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            # Load nvm for non-interactive SSH
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            BUILD_DIR=/home/dh_hmzudk/kitsunepaint-build

            # Clone or pull
            if [ -d "$BUILD_DIR/.git" ]; then
              cd "$BUILD_DIR"
              git pull origin main
            else
              rm -rf "$BUILD_DIR"
              git clone https://github.com/AdaInTheLab/KitsunePaint.git "$BUILD_DIR"
              cd "$BUILD_DIR"
            fi

            # Install Python deps
            python3 -m pip install --user UnityPy Pillow -q

            # Install all deps + build frontend
            npm install
            npx vite build

            # Kill old server, start fresh (setsid fully detaches from SSH session)
            pkill -f "node.*server.cjs" 2>/dev/null || true
            sleep 1
            cd "$BUILD_DIR"
            setsid nohup node server.cjs > /home/dh_hmzudk/kitsunepaint.log 2>&1 &
            disown
            sleep 2

            # Verify server is running
            if curl -sf http://localhost:3002/ > /dev/null; then
              echo "✅ Deployed and verified — server responding on port 3002"
            else
              echo "❌ Server started but not responding"
              tail -5 /home/dh_hmzudk/kitsunepaint.log
              exit 1
            fi
